<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="img/e.png">
    <title>Maze - Erik Romare</title>
</head>
<body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <main class="app-shell">
        <div id="header" class="brand-wrap">
            <img src="img/logo.png" alt="Deadly Green logo">
        </div>

        <div id="ui">
            <div id="left">
                <div class="cas-box">
                    <p>PREOSTALI CAS</p>
                    <h1 id="cas">00:00</h1>
                </div>

                <div class="stat-box">
                    <div class="stat-row">
                        <span>KOVANCI</span>
                        <strong id="score">0/0</strong>
                    </div>
                    <div class="stat-row">
                        <span>NAJBOLJSI CAS</span>
                        <strong id="best-time">--:--</strong>
                    </div>
                </div>

                <div class="gumbi">
                    <button id="start"><i class="fa-solid fa-play"></i> ZACNI</button>
                    <button id="draw"><i class="fa-solid fa-pen"></i> RISI</button>
                    <button id="auto"><i class="fa-solid fa-wand-magic-sparkles"></i> RESITEV</button>
                </div>

                <div id="leftf">
                    <button id="navodila" aria-label="Navodila"><i class="fa-regular fa-lightbulb"></i></button>
                    <button id="vizitka" aria-label="Vizitka"><i class="fa-solid fa-address-book"></i></button>
                    <button id="nastavitve" aria-label="Nastavitve"><i class="fa-solid fa-gear"></i></button>
                </div>
            </div>

            <div id="game-area">
                <canvas id="canvas" width="485" height="485"></canvas>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="javascript/maze.js"></script>
    <script src="javascript/main.js"></script>
</body>
</html>
