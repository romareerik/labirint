<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="img/e.png">
    <title>Maze - Erik Romare</title>
</head>
<body>
    <div class="oz-krog krog-ena"></div>
    <div class="oz-krog krog-dva"></div>

    <main class="app-okvir">
        <div id="header" class="logo-ovoj">
            <img src="img/logo.png" alt="Deadly Green logo">
        </div>

        <div id="ui">
            <div id="left">
                <div class="cas-okvir">
                    <p>ČAS</p>
                    <h1 id="cas">00:00</h1>
                </div>

                <div class="stat-okvir">
                    <div class="stat-vrst">
                        <span>NAJBOLJŠI WASD</span>
                        <div class="stat-vrednost">
                            <span id="best-medal-start" class="best-medal">--</span>
                            <strong id="best-time-start">--:--</strong>
                        </div>
                    </div>
                    <div class="stat-vrst">
                        <span>NAJBOLJŠI RIŠI</span>
                        <div class="stat-vrednost">
                            <span id="best-medal-draw" class="best-medal">--</span>
                            <strong id="best-time-draw">--:--</strong>
                        </div>
                    </div>
                </div>

                <div class="gumbki">
                    <button id="start"><i class="fa-solid fa-play"></i> WASD</button>
                    <button id="draw"><i class="fa-solid fa-pen"></i> RIŠI</button>
                    <button id="auto"><i class="fa-solid fa-wand-magic-sparkles"></i> REŠITEV</button>
                </div>

                <div id="leftf">
                    <button id="navodila" aria-label="Navodila"><i class="fa-regular fa-lightbulb"></i></button>
                    <button id="vizitka" aria-label="Vizitka"><i class="fa-solid fa-address-book"></i></button>
                    <button id="nastavitve" aria-label="Nastavitve"><i class="fa-solid fa-gear"></i></button>
                </div>
            </div>

            <div id="game-area">
                <canvas id="canvas" width="485" height="485"></canvas>
            </div>

            <aside id="right">
                <div class="medalje-okvir medalje-okvir-desno">
                    <p class="medalje-naslov">WASD</p>
                    <div class="medalja-vrst zlata">
                        <span><i class="fa-solid fa-medal"></i> ZLATA</span>
                        <strong>00:50</strong>
                    </div>
                    <div class="medalja-vrst srebrna">
                        <span><i class="fa-solid fa-medal"></i> SREBRNA</span>
                        <strong>01:00</strong>
                    </div>
                    <div class="medalja-vrst bronasta">
                        <span><i class="fa-solid fa-medal"></i> BRONASTA</span>
                        <strong>01:10</strong>
                    </div>
                    <p class="medalje-naslov">RIŠI</p>
                    <div class="medalja-vrst zlata">
                        <span><i class="fa-solid fa-medal"></i> ZLATA</span>
                        <strong>00:20</strong>
                    </div>
                    <div class="medalja-vrst srebrna">
                        <span><i class="fa-solid fa-medal"></i> SREBRNA</span>
                        <strong>00:30</strong>
                    </div>
                    <div class="medalja-vrst bronasta">
                        <span><i class="fa-solid fa-medal"></i> BRONASTA</span>
                        <strong>00:40</strong>
                    </div>
                </div>
            </aside>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="javascript/maze.js"></script>
    <script src="javascript/main.js"></script>
</body>
</html>
